appId: com.olitechhub.olitechhub
productName: OLITECHHUB
copyright: Copyright © 2026 Olitech Hub
artifactName: OLITECHHUB-Setup-${version}.${ext}

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

asar: true

# GitHub Releases — electron-updater checks GitHub API for the latest release.
# Edit owner/repo below (must match updates.host.json and package.json repository).
publish:
  provider: github
  owner: muhire565
  repo: olitechdesktop
  releaseType: release
  vPrefixedTagName: true

forceCodeSigning: false

win:
  icon: icon.png
  target:
    - target: nsis
      arch:
        - x64
  verifyUpdateCodeSignature: false
  signAndEditExecutable: false
  signtoolOptions:
    publisherName: Olitech Hub

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: OLITECHHUB
  uninstallDisplayName: OLITECHHUB
  license: license.txt
  include: installer.nsh
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  menuCategory: Olitech Hub
  displayLanguageSelector: false
  differentialPackage: true
