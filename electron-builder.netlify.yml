appId: com.olitechhub.olitechhub
productName: OLITECHHUB
copyright: Copyright © 2026 Olitech Hub
artifactName: OLITECHHUB-Setup-${version}.${ext}

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

asar: true

# Netlify static hosting — electron-updater reads latest.yml from this fixed URL.
# Edit the url below after you create your Netlify site (must match updates.host.json).
publish:
  provider: generic
  url: https://YOUR-SITE-NAME.netlify.app
  channel: latest
  useMultipleRangeRequest: false

forceCodeSigning: false

win:
  icon: icon.png
  target:
    - target: nsis
      arch:
        - x64
  verifyUpdateCodeSignature: false
  signAndEditExecutable: false
  signtoolOptions:
    publisherName: Olitech Hub

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: OLITECHHUB
  uninstallDisplayName: OLITECHHUB
  license: license.txt
  include: installer.nsh
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  menuCategory: Olitech Hub
  displayLanguageSelector: false
  differentialPackage: true
