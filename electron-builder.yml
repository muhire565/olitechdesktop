appId: com.olitechhub.olitechhub
productName: OLITECHHUB
copyright: Copyright © 2026 Olitech Hub
artifactName: OLITECHHUB-Setup-${version}.${ext}

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

asar: true

# Default local build (no publish host baked in — use release:github or release:netlify).
# See scripts/SETUP-UPDATES.txt for GitHub Releases or Netlify setup.
publish:
  - provider: generic
    url: https://releases.olitechhub.com/desktop
    channel: latest
    useMultipleRangeRequest: false

forceCodeSigning: false

win:
  icon: icon.png
  target:
    - target: nsis
      arch:
        - x64
  verifyUpdateCodeSignature: false
  # Unsigned local builds: avoids winCodeSign symlink failures on Windows without admin/Developer Mode.
  signAndEditExecutable: false
  signtoolOptions:
    publisherName: Olitech Hub


nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: OLITECHHUB
  uninstallDisplayName: OLITECHHUB
  license: license.txt
  include: installer.nsh
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  menuCategory: Olitech Hub
  displayLanguageSelector: false
  differentialPackage: true

# Portable fallback for quick demos (no admin needed)
# Uncomment if you also want a portable zip:
#   - target: portable
#     arch: [x64]
